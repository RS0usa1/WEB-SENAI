<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/pop_produtos.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div class="pop"></div>
            <h1 id="nome-produto">Tenis Nike Initiator</h1>
        <div class="slider">
            <button id="prevBtn">&#10094;</button>
            <img id="slider-img" src="" alt="">
            <button id="nextBtn">&#10095;</button>
        </div>
        <p id="desc-produto">Este é um dos nossos tenis que está disponivel para venda no BancoDigital. Nova geração de amortecimento de mola com uma camada extra de proteção na sola do tenis. Com ele é possível realizar atividades fisícas, ir trabalhar e até para ocasiões mais refinadas.</p>

        <!--Captura as informações do parâmetro-->
        <script>
            //Função para capturar os parâmetros da POP
            function getParametro(infoCapturar){
                urlParametro=new URLSearchParams(window.location.search);
                return urlParametro.get(infoCapturar);
            }

            //Preenche as informações no layout
            document.getElementById("nome-produto").textContent = getParametro("nomeProduto");
            // document.getElementById("img-produto").src = getParametro("imgProduto");
            document.getElementById("desc-produto").textContent = getParametro("descProduto");
        
            //Código do slider
            const imagens = getParametro("imgProduto")
                ? getParametro("imgProduto").split(',')
                : [];
            let index = 0;
            //Guarda o elemento HTML do Slider
            const sliderImg = document.getElementById("slider-img");
            console.log(getParametro("imgProduto"));
            //Coloca a imagem dentro do slider
            function MostrarImagens(){
                if(imagens.length > 0){
                    sliderImg.src = imagens[index];
                }
            }

            document.getElementById("prevBtn").onclick = function() {
                index = (index - 1 + imagens.length) % imagens.length;
                MostrarImagens();
            }

            document.getElementById("nextBtn").onclick = function(){
                index = (index + 1) % imagens.length;
                MostrarImagens();
            }

            //Exibe a primeira imagem 
            MostrarImagens();
        </script>
    </main>
</body>
</html>
