<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/contato.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <title>Contato</title>
</head>
<body>
    <header>
            <div class="divHeader">
                <img class="logo" src="../img/global/logo.svg"/>
                <!--Barra de navegação-->
                <nav>
                    <!--Lista de itens do menu-->
                    <ul>
                        <li><a href="../index.html">Home</a></li>
                        <li><a href="./catalogo.html">Catálogo</a></li>
                        <li><a href="./contato.html">Contato</a></li>
                    </ul>
                </nav>
            </div>
    </header>   
    <main>
        <section>
            <div id="formRetorno" class="divRetorno">
                <p id="textoRetorno" class="texto-contato"></p>
            </div>
            <div id="formulario">
                <ul class="contato-titulo">
                    <h1>Entre em Contato</h1>
                </ul>
                <form id="frmContato">
                    <fieldset>
                        <label for="name">Nome Completo:</label>
                        <input type="text" id="nome" name="" class="input-padrao" required>

                        <label for="email">Email:</label>
                        <input type="email" id="email" name="" class="input-padrao" placeholder="exemplo@gmail.com" required>

                        <label for="telefone">Telefone:</label>
                        <input type="tel" id="telefone" name="" class="input-padrao" placeholder="(11) 12345-6789" required>

                        <label for="texto">Mensagem:</label>
                        <textarea cols="70" rows="10" id="mensagem" class="input-padrao" placeholder="Digite sua mensagem aqui..." required></textarea>

                        <label class="cont">Como prefere entrar em contato? <br>
                            <input type="radio" value="radio-email" name="Contato"> Email
                            <input type="radio" value="radio-telefone" name="Contato"> Telefone
                            <input type="radio" value="radio-whatsapp" name="Contato"> WhatsApp
                        </label>
                        <br>
                        <label>Qual o motivo do contato?
                            <select>
                                <option disabled selected>Selecionar</option>
                                <option>Dúvida</option>
                                <option>Sugestão</option>
                                <option>Elogio</option>
                                <option>Reclamação</option>
                            </select>
                        </label>
                        <br>
                    </fieldset>

                    <label><input type="checkbox" class="chk">Gostaria de receber novidades por e-mail?</label>

                    <input type="submit" id="enviar" value="Enviar formulario" class="enviar">
                </form>
            </div>
        </section>
    </main>
    <footer>
        <img src="../img/global/footer.png" title="BancoDigital" class="logo_footer">
        <p>Entre em contato com o nosso suporte: 
            <a href="https://wa.me/5511123456789" target="_blank">
                <i class="fa fa-whatsapp"></i>(11) 12345-6789
            </a> | 
            <a href="https://instagram.com/richsrdsg" target="_blank">
                <i class="fa fa-instagram"></i>@CasasBahia
            </a>
        </p> 
    </footer>
    <script src="../js/form.js"></script>
</body>
</html>
