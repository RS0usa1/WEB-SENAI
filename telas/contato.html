<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/contato.css">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="divHeader">
            <img class="logo" src="../img/logo.png"/>
            <!--Barra de navegação-->
            <nav>
                <!--Lista de itens do menu-->
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./telas/catalogo.html">Catálogo</a></li>
                    <li>Sobre</li>
                </ul>
            </nav>
        </div>
    </header>  
    <main>
        <section>
            <div>
                <h1>Entre em Contato</h1>
                <form action="">
                    <fieldset>
                        <label for="name">Nome:</label>
                        <input type="text" id="nome" class="input-padrao" required>

                        <label for="email">Email:</label>
                        <input type="text" id="email" class="input-padrao" placeholder="exemplo@gmail.com" required>

                        <label for="telefone">Telefone:</label>
                        <input type="tel" id="telefone" class="input-padrao" placeholder="(11) 12345-6789" required>

                        <label for="texto">Mensagem:</label>
                        <textarea cols="70" rows="10" id="mensagem" class="input-padrao" placeholder="Digite sua mensagem aqui..." required></textarea>

                        <label for="">Como prefere entrar em contato?
                            <input type="radio" value="radio-email" name="Contato"> Email
                            <input type="radio" value="radio-telefone" name="Contato"> Telefone
                            <input type="radio" value="radio-whatsapp" name="Contato"> WhatsApp
                        </label>
                        <br>
                        <label for="">Qual o motivo do contato?
                            <select name="" id="">
                                <option value="" disabled selected>Selecionar</option>
                                <option value="">Dúvida</option>
                                <option value="">Sugestão</option>
                                <option value="">Elogio</option>
                                <option value="">Reclamação</option>
                            </select>
                        </label>
                    </fieldset>

                    <label for=""><input type="checkbox" class="chk">Gostaria de receber novidades por e-mail?</label>

                    <button type="submit">Enviar Mensagem</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <img src="./img/image.png" title="BancoDigital" class="logo_footer">
        <p>Entre em contato com o nosso suporte: 
            <a href="https://wa.me/5511123456789" target="_blank">
                <i class="fa fa-whatsapp"></i>(11) 12345-6789
            </a> | 
            <a href="https://instagram.com/richsrdsg" target="_blank">
                <i class="fa fa-instagram"></i>@BancoDigital
            </a>
        </p> 
    </footer>
</body>
</html>
